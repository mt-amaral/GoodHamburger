services:
  postgres:
    container_name: postgres
    image: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s


  goodhamburger-api:
    container_name: goodhamburger-api
    build:
      context: .
      dockerfile: GoodHamburger.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=postgres;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  goodhamburger-front:
    container_name: goodhamburger-front
    build:
      context: .
      dockerfile: GoodHamburger/Dockerfile
    depends_on:
      - goodhamburger-api
    ports:
      - "8081:80"

volumes:
  postgres_data:
